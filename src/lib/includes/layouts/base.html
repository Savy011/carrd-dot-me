{% set assetHash = global.random() %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>{{ title }}</title>

    <!-- prettier-ignore-start -->
    <style>{% renderFile "./src/lib/styles/critical.scss" %}</style>
    <!-- prettier-ignore-end -->

    {% if pageCriticalStyles %}
      {% for item in pageCriticalStyles %}
        <!-- prettier-ignore-start -->
        <style>{% renderFile "./src/lib/styles/" + item %}</style>
        <!-- prettier-ignore-end -->
      {% endfor %}
    {% endif %}

    <link
      rel="stylesheet"
      media="print"
      href="/fonts.css?{{ assetHash }}"
      onload="this.media='all'"
    />

    {% if pageStylesheets %}
      {% for item in pageStylesheets %}
        <link
          rel="stylesheet"
          media="print"
          href="{{ ("./src/lib/styles/" + item) | inputPathToUrl }}?{{ assetHash }}"
          onload="this.media='all'"
        />
      {% endfor %}
    {% endif %}
  </head>

  <body>
    {% block content %}{% endblock %}
  </body>
</html>
